name: 每日读书推送

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "仅预览，不推送、不写进度"
        required: false
        default: false
        type: boolean
      book_id:
        description: "强制指定书籍 id（留空则轮播）"
        required: false
        type: string

concurrency:
  group: daily-book-push
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  push:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 随机延迟
        run: sleep $((RANDOM % 30))

      - name: 检出代码
        uses: actions/checkout@v5

      - name: 设置 Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 执行推送
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL || secrets.GEMINI_MODEL || 'gemini/gemini-2.5-flash' }}
          GEMINI_MODEL_FALLBACK: ${{ vars.GEMINI_MODEL_FALLBACK || secrets.GEMINI_MODEL_FALLBACK || 'gemini/gemini-2.0-flash' }}
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          FEISHU_WEBHOOK_SECRET: ${{ secrets.FEISHU_WEBHOOK_SECRET }}
          FEISHU_WEBHOOK_KEYWORD: ${{ vars.FEISHU_WEBHOOK_KEYWORD || secrets.FEISHU_WEBHOOK_KEYWORD }}
          WECHAT_WEBHOOK_URL: ${{ secrets.WECHAT_WEBHOOK_URL }}
          WECHAT_MSG_TYPE: ${{ vars.WECHAT_MSG_TYPE || secrets.WECHAT_MSG_TYPE || 'markdown' }}
          WEBHOOK_VERIFY_SSL: ${{ vars.WEBHOOK_VERIFY_SSL || secrets.WEBHOOK_VERIFY_SSL || 'true' }}
        run: |
          echo "=========================================="
          echo "每日读书推送"
          echo "时间: $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')"
          echo "=========================================="
          echo "Gemini: $([ -n "$GEMINI_API_KEY" ] && echo '已配置' || echo '未配置')"
          echo "飞书: $([ -n "$FEISHU_WEBHOOK_URL" ] && echo '已配置' || echo '未配置')"
          echo "企微: $([ -n "$WECHAT_WEBHOOK_URL" ] && echo '已配置' || echo '未配置')"
          echo "=========================================="

          ARGS=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="--dry-run"
          fi
          if [ -n "${{ github.event.inputs.book_id }}" ]; then
            ARGS="$ARGS --book ${{ github.event.inputs.book_id }}"
          fi
          python main.py $ARGS

      - name: 提交阅读进度
        if: github.event.inputs.dry_run != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/progress.json
          git diff --staged --quiet || git commit -m "chore: update reading progress [skip ci]"
          git push

      - name: 上传日志
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: daily-book-push-logs-${{ github.run_number }}
          path: logs/
          retention-days: 14

name: 每日商业案例推送

on:
  schedule:
    # UTC 10:00 = 北京时间 18:00
    - cron: "0 10 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "仅预览，不推送、不写状态"
        required: false
        default: false
        type: boolean

concurrency:
  group: daily-business-push
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  push:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 随机延迟
        run: sleep $((RANDOM % 30))

      - name: 检出代码
        uses: actions/checkout@v5

      - name: 设置 Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 执行推送
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          CURSOR_MODEL: ${{ vars.CURSOR_MODEL || secrets.CURSOR_MODEL || 'composer-2.5' }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL || secrets.GEMINI_MODEL || 'gemini/gemini-2.5-flash' }}
          GEMINI_MODEL_FALLBACK: ${{ vars.GEMINI_MODEL_FALLBACK || secrets.GEMINI_MODEL_FALLBACK || 'gemini/gemini-2.0-flash' }}
          GEMINI_USE_SEARCH: ${{ vars.GEMINI_USE_SEARCH || secrets.GEMINI_USE_SEARCH || 'true' }}
          BUSINESS_FEISHU_WEBHOOK_URL: ${{ secrets.BUSINESS_FEISHU_WEBHOOK_URL }}
          BUSINESS_FEISHU_WEBHOOK_SECRET: ${{ secrets.BUSINESS_FEISHU_WEBHOOK_SECRET }}
          BUSINESS_FEISHU_WEBHOOK_KEYWORD: ${{ vars.BUSINESS_FEISHU_WEBHOOK_KEYWORD || secrets.BUSINESS_FEISHU_WEBHOOK_KEYWORD }}
          BUSINESS_WECHAT_WEBHOOK_URL: ${{ secrets.BUSINESS_WECHAT_WEBHOOK_URL }}
          BUSINESS_WECHAT_MSG_TYPE: ${{ vars.BUSINESS_WECHAT_MSG_TYPE || secrets.BUSINESS_WECHAT_MSG_TYPE || 'text' }}
          WECHAT_PERSONAL_COMPAT: ${{ vars.WECHAT_PERSONAL_COMPAT || secrets.WECHAT_PERSONAL_COMPAT || 'true' }}
          WEBHOOK_VERIFY_SSL: ${{ vars.WEBHOOK_VERIFY_SSL || secrets.WEBHOOK_VERIFY_SSL || 'true' }}
        run: |
          echo "=========================================="
          echo "每日商业案例推送 | 模式: business"
          echo "时间: $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')"
          echo "=========================================="
          echo "Cursor: $([ -n "$CURSOR_API_KEY" ] && echo '已配置' || echo '未配置')"
          echo "Gemini: $([ -n "$GEMINI_API_KEY" ] && echo '已配置' || echo '未配置')"
          echo "联网搜索: $GEMINI_USE_SEARCH"
          echo "商业飞书: $([ -n "$BUSINESS_FEISHU_WEBHOOK_URL" ] && echo '已配置' || echo '未配置')"
          echo "商业企微: $([ -n "$BUSINESS_WECHAT_WEBHOOK_URL" ] && echo '已配置' || echo '未配置')"
          echo "=========================================="

          ARGS="--mode business"
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          python main.py $ARGS

      - name: 提交状态文件
        if: github.event.inputs.dry_run != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/business_progress.json
          git diff --staged --quiet || git commit -m "chore: update business state [skip ci]"
          git push

      - name: 上传日志
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: daily-business-push-logs-${{ github.run_number }}
          path: logs/
          retention-days: 14
